schema_version: 1

workspace:
  id: example-workspace
  name: Example Workspace
  purpose: Replace this after user confirmation.
  orientation: Replace this after user confirmation.

agent_routing:
  default_skills:
    - decision-context
    - codebase-memory
  task_routes:
    - task_type: requirements_or_spec
      use_skills:
        - spectra-propose
        - spectra-ask
    - task_type: implementation
      use_skills:
        - spectra-apply
    - task_type: debugging
      use_skills:
        - superpowers:systematic-debugging
  rules:
    - Spectra remains the requirements, specs, tasks, and archive SSOT.
    - codebase-memory should be used before code discovery when available.

workflows: []

tools: []

agent_preflight:
  - Read workspace.catalog.yaml.
  - Read relevant AGENTS.md files.
  - Read active Spectra changes and related ADRs.
  - Use codebase-memory for code discovery before grep.
